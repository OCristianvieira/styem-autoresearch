name: Collect LinkedIn Metrics — 2x/semana

on:
  schedule:
    - cron: '0 12 * * 2'  # Terça 9h BRT (12h UTC) — antes do AutoResearch
    - cron: '0 12 * * 5'  # Sexta 9h BRT (12h UTC) — antes do AutoResearch
  workflow_dispatch:
    inputs:
      cliente:
        description: 'Cliente para coletar métricas'
        required: true
        default: 'powerd'
        type: choice
        options:
          - powerd
          - fernando-maeda
          - salva-tributo
          - sim-carreira

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Coletar métricas do LinkedIn via Apify
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          CLIENTE: ${{ github.event.inputs.cliente || 'powerd' }}
        run: |
          python scripts/scrape_metrics.py --cliente $CLIENTE --max-posts 30

      - name: Commit TSV atualizado
        run: |
          git config user.name "AutoResearch Bot"
          git config user.email "bot@styem.ai"
          git add performance/
          git diff --staged --quiet || git commit -m "metrics(${CLIENTE}): atualiza performance.tsv $(date +%Y-%m-%d)"
          git push
