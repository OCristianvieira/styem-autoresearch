name: Publish LinkedIn Posts — 5x/dia

on:
  schedule:
    - cron: '0 12 * * *'  # 9h BRT (12h UTC)
    - cron: '0 14 * * *'  # 11h BRT (14h UTC)
    - cron: '0 17 * * *'  # 14h BRT (17h UTC)
    - cron: '0 20 * * *'  # 17h BRT (20h UTC)
    - cron: '0 23 * * *'  # 20h BRT (23h UTC)
  workflow_dispatch:       # disparo manual quando quiser

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Publicar próximo post aprovado no LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python scripts/linkedin_post.py --today --one
